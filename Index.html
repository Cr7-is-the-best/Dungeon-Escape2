<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Escape 2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05050d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
  }
  h1 {
    margin-bottom: 8px;
    font-size: 1.1em;
    color: #554;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  canvas {
    border: 2px solid #222;
    display: block;
    cursor: crosshair;
    box-shadow: 0 0 30px rgba(255, 200, 0, 0.08);
  }
  #hint {
    margin-top: 8px;
    font-size: 0.75em;
    color: #333;
    text-align: center;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="500"></canvas>
<div id="hint">Dungeon Escape 2 — Kill enemies to earn gold • Open shop with TAB</div>
<script src="/static/game.js"></script>
</body>
</html>
